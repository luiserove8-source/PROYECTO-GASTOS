<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Gastos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-light: #e0e7ff;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --success: #10b981;
      --success-light: #d1fae5;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 28px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-card .label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .summary-card .amount { font-size: 1.6rem; font-weight: 700; }
    .summary-card.income .amount  { color: var(--success); }
    .summary-card.expense .amount { color: var(--danger); }
    .summary-card.balance .amount { color: var(--primary); }

    /* Form */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: .8rem; font-weight: 600; color: var(--muted); }

    input, select, textarea {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 60px; }

    .type-toggle {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid var(--border);
    }

    .type-toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      background: var(--bg);
      color: var(--muted);
      transition: background .15s, color .15s;
    }

    .type-toggle button.active-expense {
      background: var(--danger);
      color: #fff;
    }

    .type-toggle button.active-income {
      background: var(--success);
      color: #fff;
    }

    .btn-add {
      grid-column: 1 / -1;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 4px;
    }

    .btn-add:hover { opacity: .88; }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .filters input, .filters select {
      flex: 1;
      min-width: 140px;
      padding: 8px 12px;
      font-size: .85rem;
    }

    .filters label { display: none; }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }

    td { padding: 12px 14px; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-expense { background: var(--danger-light); color: var(--danger); }
    .badge-income  { background: var(--success-light); color: var(--success); }

    .cat-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--primary);
    }

    .amount-cell { font-weight: 700; }
    .amount-cell.expense { color: var(--danger); }
    .amount-cell.income  { color: var(--success); }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }

    .btn-del:hover { background: var(--danger-light); color: var(--danger); }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: .95rem;
    }

    /* Chart */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .bar-list { display: flex; flex-direction: column; gap: 10px; }

    .bar-row { display: flex; flex-direction: column; gap: 4px; }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: var(--muted);
      font-weight: 600;
    }

    .bar-track {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
      transition: width .5s ease;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>💸 Control de Gastos</h1>
  <p class="subtitle" id="current-month"></p>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card income">
      <span class="label">Ingresos</span>
      <span class="amount" id="total-income">$0.00</span>
    </div>
    <div class="summary-card expense">
      <span class="label">Gastos</span>
      <span class="amount" id="total-expense">$0.00</span>
    </div>
    <div class="summary-card balance">
      <span class="label">Balance</span>
      <span class="amount" id="total-balance">$0.00</span>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="card">
      <div class="card-title">📊 Gastos por categoría</div>
      <div class="bar-list" id="expense-chart"><p class="empty" style="padding:20px">Sin datos</p></div>
    </div>
    <div class="card">
      <div class="card-title">📈 Ingresos por categoría</div>
      <div class="bar-list" id="income-chart"><p class="empty" style="padding:20px">Sin datos</p></div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="card-title">➕ Nueva transacción</div>
    <form id="tx-form">
      <div class="form-grid">
        <div class="form-group">
          <label>Tipo</label>
          <div class="type-toggle">
            <button type="button" id="btn-expense" class="active-expense" onclick="setType('expense')">Gasto</button>
            <button type="button" id="btn-income" onclick="setType('income')">Ingreso</button>
          </div>
        </div>
        <div class="form-group">
          <label for="amount">Monto ($)</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="category">Categoría</label>
          <select id="category" required>
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Fecha</label>
          <input type="date" id="date" required />
        </div>
        <div class="form-group full">
          <label for="desc">Descripción (opcional)</label>
          <textarea id="desc" placeholder="Ej: Supermercado, Netflix, Nómina..."></textarea>
        </div>
        <button type="submit" class="btn-add">Agregar</button>
      </div>
    </form>
  </div>

  <!-- Transaction list -->
  <div class="card">
    <div class="card-title">📋 Historial</div>
    <div class="filters">
      <input type="month" id="filter-month" />
      <select id="filter-type">
        <option value="">Todos los tipos</option>
        <option value="expense">Gastos</option>
        <option value="income">Ingresos</option>
      </select>
      <select id="filter-cat">
        <option value="">Todas las categorías</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Categoría</th>
            <th>Descripción</th>
            <th>Monto</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tx-list"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const CATEGORIES = {
    expense: ['Alimentación','Transporte','Vivienda','Salud','Educación','Entretenimiento','Ropa','Tecnología','Servicios','Otros'],
    income:  ['Salario','Freelance','Inversiones','Ventas','Regalos','Reembolsos','Otros'],
  };

  let currentType = 'expense';
  let transactions = JSON.parse(localStorage.getItem('gastos-data') || '[]');

  function save() {
    localStorage.setItem('gastos-data', JSON.stringify(transactions));
  }

  function fmt(n) {
    return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
  }

  function fmtDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-expense').className = type === 'expense' ? 'active-expense' : '';
    document.getElementById('btn-income').className  = type === 'income'  ? 'active-income'  : '';
    populateCategorySelect('category', type);
  }

  function populateCategorySelect(id, type) {
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = '<option value="">Seleccionar...</option>';
    CATEGORIES[type].forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === prev) o.selected = true;
      sel.appendChild(o);
    });
  }

  function populateFilterCat() {
    const all = [...new Set(transactions.map(t => t.category))].sort();
    const sel = document.getElementById('filter-cat');
    const prev = sel.value;
    sel.innerHTML = '<option value="">Todas las categorías</option>';
    all.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === prev) o.selected = true;
      sel.appendChild(o);
    });
  }

  function getFiltered() {
    const month = document.getElementById('filter-month').value;
    const type  = document.getElementById('filter-type').value;
    const cat   = document.getElementById('filter-cat').value;
    return transactions.filter(t => {
      if (month && !t.date.startsWith(month)) return false;
      if (type  && t.type !== type)           return false;
      if (cat   && t.category !== cat)        return false;
      return true;
    });
  }

  function renderList() {
    const list = getFiltered().sort((a, b) => b.date.localeCompare(a.date));
    const tbody = document.getElementById('tx-list');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Sin transacciones</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(t => `
      <tr>
        <td>${fmtDate(t.date)}</td>
        <td><span class="badge badge-${t.type}">${t.type === 'expense' ? 'Gasto' : 'Ingreso'}</span></td>
        <td><span class="cat-badge">${t.category}</span></td>
        <td style="color:var(--muted);font-size:.85rem">${t.desc || '—'}</td>
        <td class="amount-cell ${t.type}">${t.type === 'expense' ? '-' : '+'}${fmt(t.amount)}</td>
        <td><button class="btn-del" onclick="remove('${t.id}')" title="Eliminar">✕</button></td>
      </tr>
    `).join('');
  }

  function renderSummary() {
    const list = getFiltered();
    const income  = list.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = list.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    const balEl = document.getElementById('total-balance');
    balEl.textContent = fmt(balance);
    balEl.style.color = balance >= 0 ? 'var(--success)' : 'var(--danger)';
  }

  function renderChart(type, containerId) {
    const list = getFiltered().filter(t => t.type === type);
    const totals = {};
    list.forEach(t => { totals[t.category] = (totals[t.category] || 0) + t.amount; });
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    const max = sorted[0]?.[1] || 1;
    const el = document.getElementById(containerId);
    if (!sorted.length) { el.innerHTML = '<p class="empty" style="padding:20px">Sin datos</p>'; return; }
    el.innerHTML = sorted.map(([cat, total]) => `
      <div class="bar-row">
        <div class="bar-label"><span>${cat}</span><span>${fmt(total)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(total/max*100).toFixed(1)}%;background:${type==='expense'?'var(--danger)':'var(--success)'}"></div></div>
      </div>
    `).join('');
  }

  function render() {
    renderSummary();
    renderList();
    renderChart('expense', 'expense-chart');
    renderChart('income',  'income-chart');
    populateFilterCat();
  }

  function remove(id) {
    transactions = transactions.filter(t => t.id !== id);
    save(); render();
  }

  document.getElementById('tx-form').addEventListener('submit', e => {
    e.preventDefault();
    const amount   = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date     = document.getElementById('date').value;
    const desc     = document.getElementById('desc').value.trim();
    if (!amount || !category || !date) return;
    transactions.push({ id: crypto.randomUUID(), type: currentType, amount, category, date, desc });
    save(); render();
    document.getElementById('amount').value = '';
    document.getElementById('desc').value   = '';
  });

  ['filter-month','filter-type','filter-cat'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
  });

  // Init
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('date').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('filter-month').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;

  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('current-month').textContent = `${monthNames[now.getMonth()]} ${now.getFullYear()}`;

  populateCategorySelect('category', 'expense');
  render();
</script>
</body>
</html>
